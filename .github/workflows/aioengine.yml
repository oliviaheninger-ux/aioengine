name: aioengine

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  ai-change-control:
    name: AI change control
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Run aioengine
        run: npx aioengine@latest ci --report aioengine-report.md

      - name: Comment aioengine report on PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr comment "$PR_URL" --body-file aioengine-report.md --edit-last --create-if-none

      - name: Upload aioengine report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: aioengine-report
          path: aioengine-report.md